<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, follow">
    <title>Page Not Found | Vinod Kumar Jaipal</title>
    <style>
        :root {
            --bg: #050510;
            --panel: rgba(255, 255, 255, 0.06);
            --border: rgba(0, 247, 255, 0.2);
            --text: #eafaff;
            --muted: rgba(234, 250, 255, 0.78);
            --accent: #00f7ff;
            --accent-2: #b84dff;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top, rgba(0, 247, 255, 0.18), transparent 30%),
                radial-gradient(circle at 80% 20%, rgba(184, 77, 255, 0.16), transparent 28%),
                var(--bg);
            color: var(--text);
        }

        body {
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .panel {
            width: min(680px, 100%);
            padding: 40px;
            border-radius: 24px;
            background: var(--panel);
            border: 1px solid var(--border);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(16px);
            text-align: center;
        }

        .code {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 84px;
            height: 84px;
            border-radius: 22px;
            margin-bottom: 18px;
            color: #000;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: 0.08em;
            box-shadow: 0 0 28px rgba(0, 247, 255, 0.3);
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 6vw, 3.6rem);
            line-height: 1.05;
        }

        p {
            margin: 16px auto 0;
            max-width: 42rem;
            color: var(--muted);
            font-size: clamp(1rem, 0.35vw + 0.95rem, 1.1rem);
            line-height: 1.7;
        }

        .actions {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 28px;
        }

        a {
            text-decoration: none;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 170px;
            padding: 14px 22px;
            border-radius: 999px;
            font-weight: 700;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-primary {
            color: #000;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            box-shadow: 0 0 24px rgba(0, 247, 255, 0.28);
        }

        .btn-secondary {
            color: var(--text);
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.04);
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .hint {
            margin-top: 18px;
            font-size: 0.95rem;
            opacity: 0.82;
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation: none !important;
                transition: none !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>

<body>
    <main class="panel">
        <div class="code">404</div>
        <h1>Page not found</h1>
        <p>The page you were looking for does not exist or has moved. Use the button below to go back to the portfolio
            homepage.</p>
        <div class="actions">
            <a class="btn btn-primary" href="/">Back to Home</a>
            <a class="btn btn-secondary" href="/index.html">Open Homepage</a>
        </div>
        <p class="hint">If you expected a section link, return to the home page and scroll to the right section.</p>
    </main>
</body>

</html>
